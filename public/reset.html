<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password</title>
    <link rel="stylesheet" href="include/styles.css">
</head>
<body>
<div class="page-shell">
    <div class="session-container">
        <p id="session" class="session-message"></p>
        <nav id="menu" class="session-menu"></nav>
    </div>

    <main class="card form-card">
        <h1>Reset password</h1>
        <p class="lead">Bytt passord mens du er logget inn.</p>
        <form id="reset" class="stack">
            <input type="password" id="oldPassword" placeholder="Old password" required>
            <input type="password" id="newPassword" placeholder="New password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            <span id="errorMessage" class="match-indicator"></span>
            <button type="submit" id="resetButton" disabled>Reset password</button>
        </form>
        <p id="resultReset" class="feedback"></p>
    </main>
</div>

<script src="include/session.pub.js" defer></script>
<script src="include/reset.pub.js" defer></script>
</body>
</html>
