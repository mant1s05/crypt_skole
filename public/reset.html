<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password</title>
    <link rel="stylesheet" href="include/styles.css">
</head>
<body>
<div class="page-shell">
    <div class="session-container">
        <p id="session" class="session-message"></p>
        <nav id="menu" class="session-menu"></nav>
    </div>

    <main class="card form-card">
        <h1>Reset password</h1>
        <p class="lead">Denne siden er ikke en del av del 4 enda, men er beholdt i prosjektet.</p>
        <form id="reset" class="stack">
            <input type="password" id="oldPassword" placeholder="Old password">
            <input type="password" id="newPassword" placeholder="New password">
            <input type="password" id="confirmPassword" placeholder="Confirm password">
            <button type="submit" id="resetButton">Reset password</button>
        </form>
        <p id="result" class="feedback">Ingen reset-rute er laget pa serveren enda.</p>
    </main>
</div>

<script src="include/session.pub.js" defer></script>
</body>
</html>
