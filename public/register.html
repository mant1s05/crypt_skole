<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="include/styles.css">
</head>
<body>
<div class="page-shell">
    <div class="session-container">
        <p id="session" class="session-message"></p>
        <nav id="menu" class="session-menu"></nav>
    </div>

    <main class="card form-card">
        <h1>Register</h1>
        <p class="lead">Opprett en bruker for a kunne teste innlogging og sessions.</p>
        <form id="register" class="stack">
            <input type="text" id="userName" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button type="submit" id="registerButton">Register</button>
        </form>
        <p id="result" class="feedback"></p>
    </main>
</div>

<script src="include/session.pub.js" defer></script>
<script src="include/register.pub.js" defer></script>
</body>
</html>
